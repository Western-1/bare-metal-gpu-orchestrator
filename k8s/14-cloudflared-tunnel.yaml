apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-tunnel-token
  namespace: ingress-nginx
type: Opaque
stringData:
  # Base64 encoded token from Cloudflare Zero Trust Dashboard
  # Replace 'your-token-here' with the actual token value before applying, or use SOPS
  TUNNEL_TOKEN: "your-token-here"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: ingress-nginx
spec:
  replicas: 2 # High availability
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:latest
        args:
        - tunnel
        - --metrics
        - 0.0.0.0:2000
        - run
        env:
        - name: TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflared-tunnel-token
              key: TUNNEL_TOKEN
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /ready
            port: 2000
          failureThreshold: 1
          initialDelaySeconds: 10
          periodSeconds: 10
