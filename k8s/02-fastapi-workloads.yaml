apiVersion: v1
kind: PersistentVolume
metadata:
  name: hf-cache-pv
  labels:
    type: local
spec:
  storageClassName: local-path
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteMany
  hostPath:
    path: "/mnt/nvme/huggingface-cache"
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hf-cache-pvc
  namespace: ml-workloads
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-service
  namespace: ml-workloads
  labels:
    app: embedding-service
    workload-type: gpu-inference
spec:
  replicas: 4
  selector:
    matchLabels:
      app: embedding-service
  template:
    metadata:
      labels:
        app: embedding-service
        workload-type: gpu-inference
    spec:
      containers:
      - name: embedding-service
        image: your-registry/embedding-service:latest
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "2Gi"
            nvidia.com/gpu: 1
          limits:
            memory: "4Gi"
            nvidia.com/gpu: 1
        env:
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        - name: PYTORCH_MEMORY_FRACTION
          value: "0.20"
        - name: HF_HOME
          value: "/app/models-cache"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: hf-cache-volume
          mountPath: "/app/models-cache"
      volumes:
      - name: tmp
        emptyDir: {}
      - name: hf-cache-volume
        persistentVolumeClaim:
          claimName: hf-cache-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-service
  namespace: ml-workloads
spec:
  selector:
    app: embedding-service
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
